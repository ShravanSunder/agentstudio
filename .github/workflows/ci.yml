name: CI / Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: macos-26
    env:
      SWIFT_BUILD_DIR: .build-ci
      XCB_EXTRA_ARGS: "--renderer github-actions"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Setup mise
        uses: jdx/mise-action@v3

      # --- Lint (fast, no build needed) ---

      - name: Install lint tools
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: brew install swift-format swiftlint

      - name: Lint
        run: mise run lint

      - name: AgentStudio architecture lint tool tests
        run: swift test --package-path Tools/AgentStudioArchitectureLint

      - name: Format check (swift-format)
        run: |
          swift-format format --in-place --recursive Sources/ Tests/ Tools/AgentStudioArchitectureLint/Sources Tools/AgentStudioArchitectureLint/Tests
          git diff --quiet -- Sources/ Tests/ Tools/AgentStudioArchitectureLint/Sources Tools/AgentStudioArchitectureLint/Tests || {
            echo "Swift formatting changes detected. Run mise run format locally.";
            git diff -- Sources/ Tests/ Tools/AgentStudioArchitectureLint/Sources Tools/AgentStudioArchitectureLint/Tests;
            exit 1;
          }

      # --- BridgeWeb check/build before Swift WebKit lanes ---

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Setup Node for BridgeWeb
        uses: actions/setup-node@v4
        with:
          node-version: "26.5.0"
          cache: pnpm
          cache-dependency-path: BridgeWeb/pnpm-lock.yaml

      - name: Install BridgeWeb dependencies
        run: mise run bridge-web-install

      - name: BridgeWeb check
        run: mise run bridge-web-check

      - name: BridgeWeb Vitest unit tests
        run: mise run bridge-web-unit-test

      - name: BridgeWeb Vitest integration tests
        run: mise run bridge-web-integration-test

      - name: BridgeWeb Vitest E2E tests
        run: mise run bridge-web-e2e-test

      - name: BridgeWeb packaged build
        run: |
          mise run bridge-web-build
          test -f Sources/AgentStudio/Resources/BridgeWeb/app/index.html
          ls -la Sources/AgentStudio/Resources/BridgeWeb/app

      # --- Submodule SHAs for cache keys ---

      - name: Get submodule SHAs
        id: submodules
        run: |
          GHOSTTY_SHA=$(git -C vendor/ghostty rev-parse HEAD)
          ZMX_SHA=$(git -C vendor/zmx rev-parse HEAD)
          echo "ghostty_sha=$GHOSTTY_SHA" >> "$GITHUB_OUTPUT"
          echo "zmx_sha=$ZMX_SHA" >> "$GITHUB_OUTPUT"

      # --- Zig compilation cache (speeds up builds on artifact cache miss) ---

      - name: Cache Zig compilation
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            vendor/ghostty/.zig-cache
            vendor/zmx/.zig-cache
          key: zig-compile-${{ runner.os }}-${{ steps.submodules.outputs.ghostty_sha }}-${{ steps.submodules.outputs.zmx_sha }}
          restore-keys: |
            zig-compile-${{ runner.os }}-

      # --- Cache/build Ghostty ---

      - name: Cache Ghostty artifacts
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: |
            vendor/ghostty/macos/GhosttyKit.xcframework
            vendor/ghostty/zig-out/share
          key: ghostty-${{ runner.os }}-${{ steps.submodules.outputs.ghostty_sha }}

      - name: Build Ghostty XCFramework
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: |
          cd vendor/ghostty
          zig build -Doptimize=ReleaseFast -Demit-xcframework=true -Demit-macos-app=false -Dxcframework-target=native

      # --- Cache/build zmx ---

      - name: Cache zmx artifacts
        id: cache-zmx
        uses: actions/cache@v4
        with:
          path: vendor/zmx/zig-out
          key: zmx-${{ runner.os }}-${{ steps.submodules.outputs.zmx_sha }}

      - name: Build zmx
        if: steps.cache-zmx.outputs.cache-hit != 'true'
        run: |
          cd vendor/zmx
          zig build -Doptimize=ReleaseFast

      # --- Setup resources + build + test (delegated to mise) ---

      - name: Copy XCFramework
        run: |
          mkdir -p Frameworks
          if [ ! -d "Frameworks/GhosttyKit.xcframework" ]; then
            cp -R vendor/ghostty/macos/GhosttyKit.xcframework Frameworks/
          fi

      - name: Setup dev resources
        run: |
          SHELL_SRC="vendor/ghostty/zig-out/share/ghostty/shell-integration"
          SHELL_DST="Sources/AgentStudio/Resources/ghostty/shell-integration"
          if [ ! -d "$SHELL_DST" ]; then
            mkdir -p "$(dirname "$SHELL_DST")"
            cp -R "$SHELL_SRC" "$SHELL_DST"
          fi
          TERMINFO_SRC="vendor/ghostty/zig-out/share/terminfo"
          TERMINFO_DST="Sources/AgentStudio/Resources/terminfo"
          if [ ! -d "$TERMINFO_DST/78" ]; then
            mkdir -p "$TERMINFO_DST/78" "$TERMINFO_DST/67"
            [ -f "$TERMINFO_SRC/78/xterm-ghostty" ] && cp "$TERMINFO_SRC/78/xterm-ghostty" "$TERMINFO_DST/78/"
            [ -f "$TERMINFO_SRC/67/ghostty" ] && cp "$TERMINFO_SRC/67/ghostty" "$TERMINFO_DST/67/"
          fi

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build-ci
          key: swift-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            swift-${{ runner.os }}-

      - name: Prebuild Swift test bundles
        env:
          SWIFT_TEST_TIMEOUT_SECONDS: "600"
          SWIFT_TEST_PREBUILD_TIMEOUT_SECONDS: "900"
        run: mise run test-prebuild

      - name: Test fast lane
        env:
          SWIFT_TEST_SKIP_PREBUILD: "1"
          SWIFT_TEST_TIMEOUT_SECONDS: "300"
          _XCB_BYPASS: "1"
        run: mise run test-fast

      - name: Test WebKit lane
        env:
          # WebKit teardown can crash swiftpm-testing-helper after assertions pass;
          # this lane isolates real WebKit runtime suites and retries signal crashes.
          SWIFT_TEST_SKIP_PREBUILD: "1"
          SWIFT_TEST_TIMEOUT_SECONDS: "600"
          XCB_EXTRA_ARGS: "--renderer github-actions"
        run: mise run test-webkit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results-*.xml
          if-no-files-found: warn
