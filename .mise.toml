run = "/bin/bash scripts/verify-beta-observability.sh"

[tasks.verify-debug-observability]
description = "Verify AgentStudio debug startup records and scrubbed fields in VictoriaLogs"
run = "/bin/bash scripts/verify-debug-observability.sh"

[tasks.verify-bridge-review-journey-smoke]
