[tools]
node = "26.5.0"
pnpm = "11.14.0"
zig = "0.15.2"

[env]
PROJECT_ROOT = "{{config_root}}"

# --- Low-level build tasks ---

[tasks.init-submodules]
description = "Populate git submodules required for vendored builds"
run = """
#!/usr/bin/env bash
set -euo pipefail
bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" require-producer
echo "[setup] hydrating git submodules..."
git submodule update --init --recursive
if [ -f "vendor/ghostty/build.zig" ]; then
  echo "[setup] ghostty ready"
fi
if [ -f "vendor/zmx/build.zig" ]; then
  echo "[setup] zmx ready"
fi
"""

[tasks.build-ghostty]
description = "Build Ghostty XCFramework"
depends = ["init-submodules"]
run = "bash \"${PROJECT_ROOT}/scripts/build-ghostty-local.sh\""

[tasks.build-zmx]
description = "Build zmx session multiplexer"
depends = ["init-submodules"]
run = """
#!/usr/bin/env bash
set -euo pipefail
bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" require-producer
bash "${PROJECT_ROOT}/scripts/zig.sh" build -Doptimize=ReleaseFast
"""
dir = "vendor/zmx"

[tasks.copy-xcframework]
description = "Copy GhosttyKit.xcframework to Frameworks/"
depends = ["build-ghostty"]
run = """
#!/usr/bin/env bash
set -euo pipefail
bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" require-producer
rm -rf Frameworks/GhosttyKit.xcframework
mkdir -p Frameworks
cp -R vendor/ghostty/macos/GhosttyKit.xcframework Frameworks/
# Drop vendored debug info from the static archive to avoid Apple toolchain
# symbol-resolution warnings during app/test links. This does not affect
# linkable symbols; it only reduces unusable third-party debug metadata.
ARCHIVE_PATH="$(find Frameworks/GhosttyKit.xcframework -type f \\( -name 'libghostty-fat.a' -o -name 'libghostty.a' \\) | head -n 1)"
if [ -n "$ARCHIVE_PATH" ]; then
  xcrun strip -S "$ARCHIVE_PATH"
fi
"""

[tasks.setup-dev-resources]
description = "Copy shell-integration and terminfo for SPM resource bundling"
depends = ["build-ghostty"]
run = """
#!/usr/bin/env bash
set -euo pipefail
bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" require-producer

# --- Shell Integration ---
SHELL_INTEGRATION_ZIG="vendor/ghostty/zig-out/share/ghostty/shell-integration"
SHELL_INTEGRATION_VENDOR="vendor/ghostty/src/shell-integration"
SHELL_INTEGRATION_DEV="Sources/AgentStudio/Resources/ghostty/shell-integration"

if [ -d "$SHELL_INTEGRATION_ZIG" ]; then
  SRC="$SHELL_INTEGRATION_ZIG"
elif [ -d "$SHELL_INTEGRATION_VENDOR" ]; then
  SRC="$SHELL_INTEGRATION_VENDOR"
else
  echo "ERROR: shell-integration not found" && exit 1
fi

if [ -d "$SHELL_INTEGRATION_DEV" ]; then
  echo "shell-integration already exists, skipping copy (use mise run refresh-vendors to force)"
else
  mkdir -p "$(dirname "$SHELL_INTEGRATION_DEV")"
  cp -R "$SRC" "$SHELL_INTEGRATION_DEV"
  echo "shell-integration -> $SHELL_INTEGRATION_DEV"
fi

# --- Terminfo (Ghostty entries only, preserve custom xterm-256color) ---
TERMINFO_SRC="vendor/ghostty/zig-out/share/terminfo"
TERMINFO_DEV="Sources/AgentStudio/Resources/terminfo"
if [ -d "$TERMINFO_SRC" ]; then
  mkdir -p "$TERMINFO_DEV/78" "$TERMINFO_DEV/67"
  if [ ! -f "$TERMINFO_DEV/78/xterm-ghostty" ] && [ -f "$TERMINFO_SRC/78/xterm-ghostty" ]; then
    cp "$TERMINFO_SRC/78/xterm-ghostty" "$TERMINFO_DEV/78/"
  fi
  if [ ! -f "$TERMINFO_DEV/67/ghostty" ] && [ -f "$TERMINFO_SRC/67/ghostty" ]; then
    cp "$TERMINFO_SRC/67/ghostty" "$TERMINFO_DEV/67/"
  fi
  echo "terminfo updated (custom xterm-256color preserved)"
fi
"""

# --- Format & lint tasks ---

[tasks.format]
description = "Format Swift sources with swift-format"
run = """
swift-format format --in-place --recursive Sources/ Tests/ Tools/AgentStudioArchitectureLint/Sources Tools/AgentStudioArchitectureLint/Tests
echo "Formatted all Swift sources"
"""

[tasks.lint]
description = "Lint Swift sources with swift-format, stock SwiftLint, and AgentStudio architecture lint"
run = "/bin/bash scripts/lint-swift.sh"

[tasks.bridge-web-check]
description = "Run BridgeWeb lint, format check, and TypeScript check"
depends = ["bridge-web-install", "bridge-web-sync-fixtures"]
dir = "BridgeWeb"
run = "pnpm run check"

[tasks.bridge-web-install]
description = "Install BridgeWeb pnpm dependencies"
dir = "BridgeWeb"
run = """
#!/usr/bin/env bash
set -euo pipefail
if command -v corepack >/dev/null 2>&1; then
  corepack enable
  corepack prepare pnpm@11.14.0 --activate
elif ! command -v pnpm >/dev/null 2>&1; then
  echo "BridgeWeb install requires corepack or pnpm on PATH" >&2
  exit 127
fi
pnpm install --frozen-lockfile
"""

[tasks.bridge-web-sync-fixtures]
description = "Verify BridgeWeb JSON contract fixtures match Swift source fixtures"
run = "bash scripts/bridge-web-sync-fixtures.sh"

[tasks.bridge-web-test]
description = "Run all BridgeWeb Vitest unit, integration, and E2E tests"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run test"

[tasks.bridge-web-unit-test]
description = "Run BridgeWeb Vitest unit tests"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run test:unit"

[tasks.bridge-web-integration-test]
description = "Run BridgeWeb Vitest Node and Browser Mode integration tests"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run test:integration"

[tasks.bridge-web-browser-test]
description = "Run BridgeWeb Vitest Browser Mode integration tests"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run test:browser"

[tasks.bridge-web-browser-stress-test]
description = "Run BridgeWeb scale-bound Browser Mode stress tests"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run test:browser:stress"

[tasks.bridge-web-e2e-test]
description = "Run BridgeWeb Vitest Vite product E2E tests"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run test:e2e"

[tasks.verify-bridge-review-controlled-composition]
description = "Verify Review product-only authority and controlled Browser Mode composition"
run = """
#!/usr/bin/env bash
set -uo pipefail
unit_status=0
browser_status=0
pnpm -C BridgeWeb exec vitest run src/app/bridge-app-review-viewer-mode.product-authority.unit.test.ts || unit_status=$?
pnpm -C BridgeWeb exec vitest --config vitest.browser.config.ts run --project integration-browser src/app/bridge-review-product-controlled-composition.browser.test.tsx || browser_status=$?
if (( unit_status != 0 )); then
  exit "$unit_status"
fi
exit "$browser_status"
"""

[tasks.bridge-web-browser-benchmark]
description = "Run BridgeWeb browser performance proof"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run test:benchmark:browser"

[tasks.bridge-web-build]
description = "Build BridgeWeb into the SwiftPM resource bundle"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run build"

[tasks.bridge-web-audit]
description = "Audit BridgeWeb packaged dependencies and app assets"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run audit:assets"

[tasks.bridge-viewer-benchmark]
description = "Run Bridge viewer large-tree and large-diff benchmark proof"
depends = ["bridge-web-install"]
dir = "BridgeWeb"
run = "pnpm run benchmark:viewer && /bin/bash ../scripts/verify-bridge-viewer-benchmark.sh"

[tasks.verify-bridge-observability]
description = "Verify Bridge debug observability events in the shared Victoria stack"
run = "bash scripts/verify-bridge-observability.sh"

[tasks.verify-bridge-headless-manifest]
description = "Verify Bridge Worktree/File headless manifest proof artifact"
run = "/bin/bash scripts/verify-bridge-headless-manifest.sh"

[tasks.doctor-mac]
description = "Check local macOS prerequisites and known build hazards"
run = """
#!/usr/bin/env bash
set -euo pipefail
bash scripts/doctor-mac.sh
"""

# --- Setup (first-time / after clean) ---

[tasks.setup]
description = "Prepare shared vendors, or explicitly hydrate and build local vendors"
depends = ["bridge-web-install", "install-hooks"]
usage = '''
flag "--use-local-vendors" help="Hydrate and build Ghostty and zmx in this worktree"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
if [[ "${usage_use_local_vendors:-false}" == "true" ]]; then
  bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" setup-local
else
  role="$(bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" role)"
  if [[ "$role" == "primary" ]]; then
    mise run copy-xcframework
    mise run --skip-deps setup-dev-resources
    mise run build-zmx
  else
    bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" setup-shared
  fi
fi
echo "Setup complete. Run mise run build or mise run test."
"""

[tasks.install-hooks]
description = "Configure git to use repo-managed hooks"
run = """
#!/usr/bin/env bash
set -euo pipefail
git config core.hooksPath .githooks
chmod +x .githooks/pre-commit .githooks/pre-push
echo "Configured git hooks path: .githooks"
echo "Installed pre-commit hook: .githooks/pre-commit"
echo "Installed pre-push hook: .githooks/pre-push"
"""

# --- Composite build tasks ---

[tasks.verify-vendors]
description = "Verify this worktree's prepared Ghostty and zmx inputs"
run = "bash \"${PROJECT_ROOT}/scripts/vendor-worktree.sh\" verify"

[tasks.build]
description = "Debug build (run mise run setup first time)"
depends = ["verify-vendors", "bridge-web-build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
source "${PROJECT_ROOT}/scripts/xcb-helpers.sh"
source "${PROJECT_ROOT}/scripts/swift-build-slot.sh"
BUILD_PATH="$SWIFT_BUILD_DIR"
echo "[build] BUILD_PATH=$BUILD_PATH"
xcb_pipe=$(_xcb_pipe_cmd)
swift build --build-path "$BUILD_PATH" 2>&1 | $xcb_pipe
"""

[tasks.build-release]
description = "Release build (run mise run setup first time)"
depends = ["verify-vendors", "bridge-web-build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
source "${PROJECT_ROOT}/scripts/xcb-helpers.sh"
source "${PROJECT_ROOT}/scripts/swift-build-slot.sh"
BUILD_PATH="$SWIFT_BUILD_DIR"
echo "[build-release] BUILD_PATH=$BUILD_PATH"
xcb_pipe=$(_xcb_pipe_cmd)
swift build -c release --build-path "$BUILD_PATH" 2>&1 | $xcb_pipe
"""

[tasks.test]
description = "Run default test suite; real zmx lifecycle proof stays in test-zmx-e2e"
depends = ["verify-vendors", "bridge-web-build"]
run = "/bin/bash scripts/run-swift-test-task.sh test"

[tasks.test-fast]
description = "Run fast lane: fast non-WebKit tests, excluding large script/smoke/integration/benchmark proof"
depends = ["verify-vendors", "bridge-web-build"]
run = "/bin/bash scripts/run-swift-test-task.sh test-fast"

[tasks.test-large]
description = "Run large non-WebKit script, smoke, and integration tests"
depends = ["verify-vendors", "bridge-web-build"]
run = "/bin/bash scripts/run-swift-test-task.sh test-large"

[tasks.test-prebuild]
description = "Prebuild Swift test bundles for cached CI test lanes"
depends = ["verify-vendors", "bridge-web-build"]
run = "/bin/bash scripts/run-swift-test-task.sh test-prebuild"

[tasks.test-webkit]
description = "Run real WebKit runtime tests in isolated serial processes with crash retry"
depends = ["verify-vendors", "bridge-web-build"]
run = "/bin/bash scripts/run-swift-test-task.sh test-webkit"

[tasks.test-coverage]
description = "Run test suite with code coverage and print coverage JSON path"
depends = ["verify-vendors", "bridge-web-build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
source "${PROJECT_ROOT}/scripts/swift-build-slot.sh"
BUILD_PATH="$SWIFT_BUILD_DIR"
TIMEOUT_SECONDS="${SWIFT_TEST_TIMEOUT_SECONDS:-60}"
echo "[test-coverage] BUILD_PATH=$BUILD_PATH"
echo "[test-coverage] TIMEOUT_SECONDS=$TIMEOUT_SECONDS"

LOG_PREFIX="test-coverage"
EXTRA_SWIFT_TEST_ARGS="--enable-code-coverage"
source scripts/swift-test-helpers.sh

prebuild_swift_tests

run_non_serialized_swift_tests "non-serialized suites (coverage)"
run_webkit_suites

echo "--- E2E serialized tests (serial, coverage) ---"
if [ "${SWIFT_TEST_INCLUDE_E2E:-0}" = "1" ]; then
  run_swift_with_timeout \
    "E2ESerializedTests (coverage)" \
    "$TIMEOUT_SECONDS" \
    env AGENT_STUDIO_BENCHMARK_MODE=off swift test --enable-code-coverage --skip-build --filter E2ESerializedTests --skip ZmxE2ETests --build-path "$BUILD_PATH"
else
  echo "[test-coverage] skipping E2ESerializedTests (SWIFT_TEST_INCLUDE_E2E=${SWIFT_TEST_INCLUDE_E2E:-0})"
fi

CODECOV_TMPFILE=$(mktemp)
run_swift_with_timeout "show-codecov-path" "$TIMEOUT_SECONDS" \
  bash -c "swift test --show-codecov-path --build-path \"${BUILD_PATH}\" > \"${CODECOV_TMPFILE}\""
COVERAGE_JSON_PATH=$(cat "$CODECOV_TMPFILE")
rm -f "$CODECOV_TMPFILE"
echo "[coverage] JSON: $COVERAGE_JSON_PATH"
if [ -f "$COVERAGE_JSON_PATH" ] && command -v jq >/dev/null 2>&1; then
  LINES_PERCENT=$(jq -r '.data[0].totals.lines.percent // empty' "$COVERAGE_JSON_PATH" || true)
  FUNCTIONS_PERCENT=$(jq -r '.data[0].totals.functions.percent // empty' "$COVERAGE_JSON_PATH" || true)
  REGIONS_PERCENT=$(jq -r '.data[0].totals.regions.percent // empty' "$COVERAGE_JSON_PATH" || true)
  if [ -n "$LINES_PERCENT" ]; then
    echo "[coverage] lines=%$LINES_PERCENT functions=%$FUNCTIONS_PERCENT regions=%$REGIONS_PERCENT"
  fi
fi
"""

[tasks.test-e2e]
description = "Run general E2E serialized tests only; excludes the dedicated zmx lifecycle lane"
depends = ["verify-vendors", "bridge-web-build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
source "${PROJECT_ROOT}/scripts/xcb-helpers.sh"
source "${PROJECT_ROOT}/scripts/swift-build-slot.sh"
BUILD_PATH="$SWIFT_BUILD_DIR"
xcb_pipe=$(_xcb_pipe_cmd)
swift build --build-tests --build-path "$BUILD_PATH" 2>&1 | $xcb_pipe
AGENT_STUDIO_BENCHMARK_MODE=off swift test --skip-build --filter E2ESerializedTests --skip ZmxE2ETests --build-path "$BUILD_PATH" 2>&1 | $xcb_pipe
"""

[tasks.test-zmx-e2e]
description = "Run zmx E2E tests only (opt-in; may stall)"
depends = ["verify-vendors", "bridge-web-build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
source "${PROJECT_ROOT}/scripts/xcb-helpers.sh"
source "${PROJECT_ROOT}/scripts/swift-build-slot.sh"
BUILD_PATH="$SWIFT_BUILD_DIR"
xcb_pipe=$(_xcb_pipe_cmd)
swift build --build-tests --build-path "$BUILD_PATH" 2>&1 | $xcb_pipe
AGENT_STUDIO_BENCHMARK_MODE=off swift test --skip-build --filter ZmxE2ETests --build-path "$BUILD_PATH" 2>&1 | $xcb_pipe
"""

[tasks.test-benchmark]
description = "Run benchmark-only bridge push tests"
depends = ["build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
source "${PROJECT_ROOT}/scripts/xcb-helpers.sh"
source "${PROJECT_ROOT}/scripts/swift-build-slot.sh"
BUILD_PATH="$SWIFT_BUILD_DIR"
export AGENT_STUDIO_BENCHMARK_MODE=benchmark
xcb_pipe=$(_xcb_pipe_cmd)
swift test --build-path "$BUILD_PATH" --filter "PushBenchmarkSupportTests" 2>&1 | $xcb_pipe
swift test --build-path "$BUILD_PATH" --filter "PushPerformanceBenchmarkTests" 2>&1 | $xcb_pipe
"""

[tasks.clean-artifacts]
description = "Clean swift build dirs and app bundle (vendor and vendor-derived files preserved)"
run = """
#!/usr/bin/env bash
set -euo pipefail
rm -rf "${PROJECT_ROOT}/.build" "${PROJECT_ROOT}"/.build-*
rm -rf "${PROJECT_ROOT}/AgentStudio.app"
echo "Cleaned swift build dirs and app bundle in ${PROJECT_ROOT}"
"""

[tasks.refresh-vendors]
description = "Re-copy vendor-derived resources from vendor/ghostty (forces overwrite of GhosttyKit.xcframework, shell-integration, terminfo)"
run = """
#!/usr/bin/env bash
set -euo pipefail
bash "${PROJECT_ROOT}/scripts/vendor-worktree.sh" require-producer
rm -rf "${PROJECT_ROOT}/Frameworks/GhosttyKit.xcframework"
rm -rf "${PROJECT_ROOT}/Sources/AgentStudio/Resources/ghostty"
rm -f "${PROJECT_ROOT}/Sources/AgentStudio/Resources/terminfo/67/ghostty"
mise run copy-xcframework
mise run setup-dev-resources
echo "Refreshed vendor-derived resources"
"""

[tasks.clean-agent-builds]
description = "Reap stale .slot-claim leaks from agent build dirs (safe while other agents work)"
run = """
#!/usr/bin/env bash
set -euo pipefail
shopt -s nullglob
reaped=0
for dir in .build-agent-1 .build-agent-2; do
  [ -d "$dir/.slot-claim" ] || continue
  if ! lsof +D "$dir" >/dev/null 2>&1; then
    rm -rf "$dir/.slot-claim"
    echo "[clean-agent-builds] reaped stale claim: $dir/.slot-claim"
    reaped=$((reaped + 1))
  fi
done
echo "[clean-agent-builds] reaped $reaped stale claim(s)"
"""

[tasks.create-app-bundle]
description = "Create signed AgentStudio.app bundle"
depends = ["build-release"]
run = """
#!/usr/bin/env bash
set -e

# Find the freshest release artifact across the two shared build slots.
if [ -n "${SWIFT_BUILD_DIR:-}" ] && \
  { [ "$SWIFT_BUILD_DIR" = ".build-agent-1" ] || \
    [ "$SWIFT_BUILD_DIR" = ".build-agent-2" ] || \
    { { [ "${CI:-}" = "true" ] || [ "${GITHUB_ACTIONS:-}" = "true" ]; } && \
      [ "$SWIFT_BUILD_DIR" = ".build-ci" ]; }; } && \
  [ -f "$SWIFT_BUILD_DIR/release/AgentStudio" ]
then
  BUILD_PATH="$SWIFT_BUILD_DIR"
else
  BUILD_PATH=""
  newest_mtime=0
  for n in 1 2; do
    candidate=".build-agent-$n"
    binary="$candidate/release/AgentStudio"
    if [ -f "$binary" ]; then
      mtime=$(stat -f %m "$binary")
      if [ "$mtime" -gt "$newest_mtime" ]; then
        newest_mtime="$mtime"
        BUILD_PATH="$candidate"
      fi
    fi
  done
  if [ -z "$BUILD_PATH" ]; then
    echo "create-app-bundle: no release artifact found in .build-agent-1 or .build-agent-2" >&2
    exit 1
  fi
fi
echo "[create-app-bundle] BUILD_PATH=$BUILD_PATH"
APP_DIR="AgentStudio.app/Contents"
rm -rf AgentStudio.app
mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"

# Binary
cp "$BUILD_PATH/release/AgentStudio" "$APP_DIR/MacOS/"

# zmx
if [ ! -x "vendor/zmx/zig-out/bin/zmx" ] || [ -L "vendor/zmx/zig-out/bin/zmx" ]; then
  echo "create-app-bundle: verified zmx executable is missing or unsafe" >&2
  exit 1
fi
cp vendor/zmx/zig-out/bin/zmx "$APP_DIR/MacOS/"

# Info.plist + icon
cp Sources/AgentStudio/Resources/Info.plist "$APP_DIR/"
MARKETING_VERSION="${APP_MARKETING_VERSION:-0.0.1-dev}"
BUILD_VERSION="${APP_BUILD_VERSION:-$(git rev-list --count HEAD)}"
RELEASE_CHANNEL="${APP_RELEASE_CHANNEL:-stable}"
/bin/bash scripts/inject-bundle-version.sh "$APP_DIR/Info.plist" "$MARKETING_VERSION" "$BUILD_VERSION" "$RELEASE_CHANNEL"
cp Sources/AgentStudio/Resources/AppIcon.icns "$APP_DIR/Resources/"

# terminfo
TERMINFO="Sources/AgentStudio/Resources/terminfo"
[ -d "$TERMINFO" ] && cp -R "$TERMINFO" "$APP_DIR/Resources/"

# shell-integration
GHOSTTY_RES="Sources/AgentStudio/Resources/ghostty"
[ -d "$GHOSTTY_RES" ] && { mkdir -p "$APP_DIR/Resources/ghostty"; cp -R "$GHOSTTY_RES/." "$APP_DIR/Resources/ghostty/"; }

# GhosttyKit is a static library — already linked into the binary at build time.
# Do NOT embed the xcframework; it's only needed at build time for SwiftPM.

# SwiftPM resource bundle — Bundle.appResources looks in Contents/Resources/
RESOURCE_BUNDLE="$(find "$BUILD_PATH" -path '*/release/AgentStudio_AgentStudio.bundle' -type d | head -1)"
[ -n "$RESOURCE_BUNDLE" ] && cp -R "$RESOURCE_BUNDLE" "$APP_DIR/Resources/"

# Sign — uses Developer ID if SIGNING_IDENTITY is set, else ad-hoc
ENTITLEMENTS="Sources/AgentStudio/Resources/AgentStudio.entitlements"
IDENTITY="${SIGNING_IDENTITY:--}"
TIMESTAMP_ARGS=()
if [ "${SIGNING_TIMESTAMP:-1}" != "0" ]; then
  TIMESTAMP_ARGS=(--timestamp)
elif [ "$IDENTITY" != "-" ]; then
  echo "Signing timestamp disabled (SIGNING_TIMESTAMP=0)"
fi

if [ "$IDENTITY" != "-" ]; then
  echo "Signing with: $IDENTITY"
  if [ -d "AgentStudio.app/Contents/Frameworks" ]; then
    find AgentStudio.app/Contents/Frameworks -name "*.dylib" -o -name "*.framework" | while read item; do
      codesign --force --sign "$IDENTITY" "${TIMESTAMP_ARGS[@]}" --options runtime "$item"
    done
  fi
  [ -f "AgentStudio.app/Contents/MacOS/zmx" ] && \
    codesign --force --sign "$IDENTITY" "${TIMESTAMP_ARGS[@]}" --options runtime --entitlements "$ENTITLEMENTS" "AgentStudio.app/Contents/MacOS/zmx"
  codesign --force --sign "$IDENTITY" "${TIMESTAMP_ARGS[@]}" --options runtime --entitlements "$ENTITLEMENTS" AgentStudio.app
else
  echo "Ad-hoc signing (set SIGNING_IDENTITY for Developer ID)"
  codesign --force --deep --sign - AgentStudio.app
fi

codesign --verify --deep --strict AgentStudio.app
echo "AgentStudio.app created and signed"
"""

